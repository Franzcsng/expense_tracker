<!DOCTYPE html>
<html>
<head>
  <title>Receipt Upload Test</title>
</head>

<body>

<h2>Upload Receipt Image</h2>

<form id="uploadForm">
  <input 
    type="file" 
    id="image" 
    name="receipt"
    accept="image/*"
    required
  />

  <br><br>

  <button type="submit">
    Upload
  </button>
</form>

<p id="result"></p>


<script>
const form = document.getElementById("uploadForm");

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const fileInput = document.getElementById("image");
  const file = fileInput.files[0];

  const formData = new FormData();

  // This name "receipt" must match your n8n binary field name
  formData.append("receipt", file);

  try {
    const response = await fetch(
      "https://franzcsng.app.n8n.cloud/webhook-test/f2f3d430-8dba-403b-8da6-326f28e2f542",
      {
        method: "POST",
        body: formData
      }
    );

    const data = await response.json();

    document.getElementById("result").innerText =
      JSON.stringify(data, null, 2);

  } catch (error) {
    console.error(error);
    document.getElementById("result").innerText =
      error.message;
  }
});
</script>

</body>
</html>
